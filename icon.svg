<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A1208"/>
      <stop offset="100%" stop-color="#160A04"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B87040"/>
      <stop offset="100%" stop-color="#7A4520"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3E2210"/>
      <stop offset="100%" stop-color="#261508"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFCC66" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF7700" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="steamBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="36" fill="url(#bg)"/>

  <!-- Wooden body -->
  <rect x="36" y="142" width="184" height="94" rx="5" fill="url(#wood)"/>

  <!-- Plank lines -->
  <line x1="36" y1="160" x2="220" y2="160" stroke="#5A3010" stroke-width="2.5" opacity="0.55"/>
  <line x1="36" y1="178" x2="220" y2="178" stroke="#5A3010" stroke-width="2.5" opacity="0.55"/>
  <line x1="36" y1="196" x2="220" y2="196" stroke="#5A3010" stroke-width="2.5" opacity="0.55"/>
  <line x1="36" y1="214" x2="220" y2="214" stroke="#5A3010" stroke-width="2.5" opacity="0.55"/>
  <line x1="36" y1="232" x2="220" y2="232" stroke="#5A3010" stroke-width="2.5" opacity="0.55"/>

  <!-- Roof -->
  <polygon points="22,148 128,62 234,148" fill="url(#roof)"/>
  <line x1="22" y1="148" x2="234" y2="148" stroke="#1A0C04" stroke-width="3"/>

  <!-- Door -->
  <rect x="105" y="180" width="46" height="56" rx="4" fill="#1C0C04"/>
  <rect x="105" y="180" width="46" height="56" rx="4" fill="none" stroke="#8B5020" stroke-width="2"/>
  <circle cx="141" cy="210" r="4" fill="#C89030"/>
  <circle cx="141" cy="210" r="2" fill="#FFCC60"/>

  <!-- Glowing window -->
  <rect x="52" y="158" width="42" height="32" rx="4" fill="url(#glow)"/>
  <rect x="55" y="161" width="36" height="26" rx="2" fill="#FFD070" opacity="0.5"/>
  <line x1="73" y1="158" x2="73" y2="190" stroke="#7A4520" stroke-width="1.5" opacity="0.6"/>
  <line x1="52" y1="174" x2="94" y2="174" stroke="#7A4520" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="73" cy="198" rx="28" ry="8" fill="#FF9020" opacity="0.18"/>

  <!-- Steam wisps -->
  <path d="M88,58 C82,47 93,37 87,26 C81,15 90,7 86,0"
        stroke="white" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.55" filter="url(#steamBlur)"/>
  <path d="M128,52 C121,39 134,28 128,16 C122,4 131,0 128,0"
        stroke="white" stroke-width="6" fill="none"
        stroke-linecap="round" opacity="0.65" filter="url(#steamBlur)"/>
  <path d="M168,58 C174,47 163,37 169,26 C175,15 166,7 170,0"
        stroke="white" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.55" filter="url(#steamBlur)"/>

  <!-- Ember glow at base -->
  <ellipse cx="128" cy="236" rx="80" ry="10" fill="#FF5500" opacity="0.12"/>
</svg>
